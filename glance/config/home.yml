- name: Home
  # Optionally, if you only have a single page you can hide the desktop navigation for a cleaner look
  # hide-desktop-navigation: true
  columns:
    - size: small
      widgets:
        - type: calendar
          first-day-of-week: monday

        - type: weather
          location: London, United Kingdom
          units: metric # alternatively "imperial"
          hour-format: 12h # alternatively "24h"
          # Optionally hide the location from being displayed in the widget
          # hide-location: true

        - type: rss
          limit: 10
          collapse-after: 5
          cache: 12h
          feeds:
            - url: https://xkcd.com/rss.xml
              title: XKCD
            - url: https://universe.eveonline.com/feed/new-eden-news.rss
              title: EVE Universe
            - url: http://www.gameinformer.com/feeds/thefeedrss.aspx
              title: Game Informer
            - url: http://blogs.msdn.com/webdevtools/rss.xml
              title: ASP.NET Web Tools Blog
            - url: https://devblogs.microsoft.com/feed/landingpage
              title: Microsoft Dev Blogs
            - url: https://ciechanow.ski/atom.xml
            - url: https://www.joshwcomeau.com/rss.xml
              title: Josh Comeau
            - url: https://samwho.dev/rss.xml
            - url: https://ishadeed.com/feed.xml
              title: Ahmad Shadeed


    - size: full
      widgets:

        - type: search
          search-engine: google
          bangs:
            - title: YouTube
              shortcut: "!yt"
              url: https://www.youtube.com/results?search_query={QUERY}      

        - type: group
          widgets:
            - type: hacker-news
            - type: reddit
              subreddit: dotnet
              show-thumbnails: true          
            - type: reddit
              subreddit: programming
              show-thumbnails: true
            - type: reddit
              subreddit: technology
              show-thumbnails: true
            - type: reddit
              subreddit: selfhosted
              show-thumbnails: true
            - type: lobsters

        - type: videos
          style: grid-cards
          collapse-after-rows: 2
          channels:
            - UCXuqSBlHAE6Xw-yeJA0Tunw # Linus Tech Tips
            - UCR-DXc1voovS8nhAvccRZhg # Jeff Geerling
            - UCsBjURrPoezykLs9EqgamOA # Fireship
            - UCBJycsmduvYEL83R_U4JriQ # Marques Brownlee
            - UCHnyfMqiRRG1u-2MsSQLbXA # Veritasium
            - UCUdilFzFJKfzwKghoAWov_g # UsualExpat
            - UCxn8csYeZg6awRnZS-aqg0g # Diablo
            - UCvtT19MZW8dq5Wwfu6B0oxw # Dotnet
            - UCwF3VyalTHzL0L-GDlwtbRw # EVE Online
            - UC9N0DmacOi4iWKQyygX89OQ # Fighting Cowboy
            - UCNvzD7Z-g64bPXxGzaQaa4g # gameranx
            - UCxQKHvKbmSzGMvUrVtJYnUA # Learn Linux TV
            - UCqVX2VLgAAK_aTrcAPaf6sw # markeedragon
            - UCsMica-v34Irf9KVTh6xx-g # Microsoft Developer
            - UChqrDOwARrxdJF-ykAptc7w # Visual Studio
            - UCFig7skuwYrCIGy0tuZHA2Q # Sean Kochel

    - size: small
      widgets:

        - type: server-stats
          servers:
            - type: local
              name: Services


        - type: docker-containers
          hide-by-default: false

        - type: monitor
          cache: 1m
          title: Services
          sites:
            - title: usualexpat.com
              url: https://usualexpat.com
            - title: shop.usualexpat.com
              url: https://shop.usualexpat.com/

        - type: markets
          markets:
            - symbol: SPY
              name: S&P 500
            - symbol: FTSE
              name: FTSE 100
            - symbol: VNGO
              name: Vanguard Total Stock Market
            - symbol: BTC-USD
              name: Bitcoin
            - symbol: NVDA
              name: NVIDIA
            - symbol: AAPL
              name: Apple
            - symbol: MSFT
              name: Microsoft

